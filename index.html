<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KidsChat</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
</head>

<body>

  <!-- Sign-in screen -->
  <div id="signin-screen">
    <div class="signin-card">
      <div class="signin-icon" aria-hidden="true">💬</div>
      <h1 class="signin-title">KidsChat</h1>
      <p class="signin-hint">Private chat for approved family members only.</p>
      <button id="sign-in-btn" class="btn-google">
        <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Sign in with Google
      </button>
      <p id="auth-status" class="signin-status"></p>
    </div>
  </div>

  <!-- Chat screen -->
  <section id="chat-section" class="hidden">

    <header class="chat-header">
      <div class="chat-header__brand">
        <span aria-hidden="true">💬</span>
        <span>KidsChat</span>
      </div>
      <div class="chat-header__actions">
        <button id="profile-btn" class="btn-profile" title="Edit profile" aria-label="Edit profile">
          <span id="user-avatar" class="user-avatar" aria-hidden="true">😀</span>
          <span id="user-name" class="user-name"></span>
        </button>
        <button id="sign-out-btn" class="btn-signout hidden">Sign out</button>
      </div>
    </header>

    <div id="push-section" class="push-banner hidden">
      <p id="push-status"></p>
    </div>

    <div id="messages" aria-live="polite"></div>

    <!-- Picker panels -->
    <div id="emoji-panel" class="picker-panel hidden">
      <emoji-picker></emoji-picker>
    </div>
    <div id="gif-panel" class="picker-panel hidden">
      <div class="gif-panel__header">
        <input id="gif-search-input" type="search" placeholder="Search GIFs…" autocomplete="off" />
      </div>
      <div id="gif-results" class="gif-results"></div>
      <div id="gif-load-more" class="gif-load-more hidden">
        <button type="button">Load more</button>
      </div>
    </div>

    <div class="composer">
      <form id="message-form">
        <button type="button" id="emoji-btn" class="btn-composer-icon" aria-label="Add emoji"
          title="Add emoji">😊</button>
        <button type="button" id="gif-btn" class="btn-composer-gif" aria-label="Send a GIF"
          title="Send a GIF">GIF</button>
        <input id="message-input" type="text" maxlength="500" placeholder="Type a message…" required
          autocomplete="off" />
        <button type="submit" class="btn-send" aria-label="Send message">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </form>
      <p id="message-status" class="composer__status"></p>
    </div>

  </section>

  <!-- Profile modal -->
  <div id="profile-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Edit profile">
    <div class="modal-card">
      <h2 class="modal-title">Edit Profile</h2>
      <div id="avatar-preview" class="avatar-preview">😀</div>
      <div id="avatar-grid" class="avatar-grid"></div>
      <label class="profile-label" for="profile-name-input">Display name</label>
      <input id="profile-name-input" type="text" class="profile-name-input" maxlength="30" placeholder="Your name"
        autocomplete="off" />
      <div class="modal-actions">
        <button id="profile-cancel-btn" type="button" class="btn-modal-cancel">Cancel</button>
        <button id="profile-save-btn" type="button" class="btn-modal-save">Save</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>

</html>
